<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Login | KollegeKart</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <section class="login-page">

    <form class="login-form">

      <h1>Welcome to KollegeKart</h1>

      <input type="text"
             id="name"
             placeholder="Enter your name"
             required>

      <input type="email"
             id="email"
             placeholder="Enter your email"
             required>

      <button type="submit">
        Login
      </button>

    </form>

  </section>

  <script src="login.js"></script>

</body>
</html>
