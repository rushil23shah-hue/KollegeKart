<body>
<link rel="stylesheet" href="style.css">
  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="logo-section">

      <img src="logo.jpeg"
           class="logo">

      <h2>KollegeKart</h2>

    </div>

    <ul class="nav-links">

      <li>
        <a href="index.html">Home</a>
      </li>

      <li>
        <a href="cart.html">Cart</a>
      </li>

    </ul>

  </nav>

  <!-- SELL PAGE -->

  <section class="sell-page">

    <!-- LEFT SIDE -->

    <div class="sell-left">

      <h1>
        Start Selling <br>
        on KollegeKart
      </h1>

      <p>
        Turn your unused books, notes,
        gadgets and project kits into cash.
      </p>

      <img src="assests.svg"
           alt="Selling Illustration">

    </div>

    <!-- RIGHT SIDE -->

    <div class="sell-right">

      <form class="sell-form">

        <h2>List Your Product</h2>

        <input type="text"
               id="title"
               placeholder="Product Title"
               required>

        <input type="number"
               id="price"
               placeholder="Price"
               required>

        <input type="text"
               id="category"
               placeholder="Category"
               required>

        <input type="text"
               id="image"
               placeholder="Image URL"
               required>

        <button type="submit">
          Add Product
        </button>

      </form>

    </div>

  </section>

  <script src="sell.js"></script>

</body>
